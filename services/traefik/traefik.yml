# Traefik Static Configuration for Tailscale

global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true  # OK because only accessible via Tailscale

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: services_net
  
  file:
    filename: /dynamic-config.yml
    watch: true

log:
  level: INFO

accessLog:
  filePath: "/var/log/access.log"
