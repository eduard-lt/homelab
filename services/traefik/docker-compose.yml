version: "3.8"

services:
  traefik:
    container_name: traefik
    image: traefik:v3.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Bind to Tailscale IP only (not public internet)
      # Using 8080/8443 instead of 80/443 (CasaOS uses 80)
      - "100.70.106.23:8080:80"     # HTTP (Tailscale only)
      - "100.70.106.23:8443:443"    # HTTPS (Tailscale only)
      - "100.70.106.23:9080:8080"   # Dashboard (Tailscale only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic-config.yml:/dynamic-config.yml:ro
      - ./acme.json:/acme.json
      # Tailscale SSL certificates
      - ./thedarkurge.tailc19e34.ts.net.crt:/certs/thedarkurge.tailc19e34.ts.net.crt:ro
      - ./thedarkurge.tailc19e34.ts.net.key:/certs/thedarkurge.tailc19e34.ts.net.key:ro
    networks:
      - services_net
      - media_net
      - gaming_net
      - monitoring_net
    labels:
      # Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${DASHBOARD_USER}"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  services_net:
    external: true
  media_net:
    external: true
  gaming_net:
    external: true
  monitoring_net:
    external: true
