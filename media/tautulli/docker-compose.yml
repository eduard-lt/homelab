version: '3.8'
services:
  tautulli:
    image: linuxserver/tautulli:2.13.2
    container_name: tautulli
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Europe/Amsterdam
    volumes:
    - /DATA/AppData/tautulli/config:/config
    ports:
    - 8181:8181
    networks:
    - media_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    labels:
    - traefik.enable=true
    - traefik.http.routers.tautulli.rule=Host(`tautulli.thedarkurge.li-rattlesnake.ts.net`)
      || Host(`100.70.106.23`)
    - traefik.http.routers.tautulli.entrypoints=websecure
    - traefik.http.routers.tautulli.tls=true
    - traefik.http.routers.tautulli.service=tautulli
    - traefik.http.services.tautulli.loadbalancer.server.port=8181
    - casaos=casaos
    - custom_id=f11fdb5f-4a1f-457b-a772-b597971f3702
    - origin=local
    - name=tautulli
    - desc=Plex monitoring and tracking
    - protocol=http
    - show_env=casaos
    - io.casaos.v1.app.store.id=0
    - icon=https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Tautulli/icon.png
    - web=8181
    - host=172.26.1.31:8181
networks:
  media_net:
    external: true
x-casaos:
  store_app_id: tautulli
  title:
    en_us: Tautulli
  main: tautulli
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Tautulli/icon.png
  port_map: '8181'
  scheme: http
  index: /
  is_uncontrolled: false
