version: '3.8'
services:
  qbittorrent:
    image: hotio/qbittorrent:release-5.0.1
    container_name: qbittorrent
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Europe/Amsterdam
    - UMASK=002
    volumes:
    - /DATA/AppData/qbittorrent/config:/config
    - /DATA:/DATA
    ports:
    - 8081:8080
    networks:
    - media_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          memory: 512M
    labels:
    - traefik.enable=true
    - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.thedarkurge.li-rattlesnake.ts.net`)
      || Host(`100.70.106.23`)
    - traefik.http.routers.qbittorrent.entrypoints=websecure
    - traefik.http.routers.qbittorrent.tls=true
    - traefik.http.routers.qbittorrent.service=qbittorrent
    - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    - casaos=casaos
    - custom_id=b1a18fa8-a2fc-457b-a596-c89dd2d89bfc
    - origin=local
    - name=qbittorrent
    - desc=BitTorrent client with web interface
    - protocol=http
    - show_env=casaos
    - io.casaos.v1.app.store.id=0
    - icon=https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/icon.png
    - web=8081
    - host=172.26.1.31:8081
networks:
  media_net:
    external: true
x-casaos:
  store_app_id: qbittorrent
  title:
    en_us: qBittorrent
  main: qbittorrent
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/icon.png
  port_map: '8081'
  scheme: http
  index: /
  is_uncontrolled: false
