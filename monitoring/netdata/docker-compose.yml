version: '3.8'
services:
  netdata:
    container_name: netdata
    image: netdata/netdata:stable
    restart: unless-stopped
    hostname: thedarkurge
    cap_add:
    - SYS_PTRACE
    security_opt:
    - apparmor:unconfined
    volumes:
    - /etc/passwd:/host/etc/passwd:ro
    - /etc/group:/host/etc/group:ro
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./config/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
    ports:
    - 19999:19999
    networks:
    - monitoring_net
    labels:
    - traefik.enable=true
    - traefik.http.routers.netdata.rule=Host(`monitor.${DOMAIN}`) || Host(`${TAILSCALE_IP}`)
    - traefik.http.routers.netdata.entrypoints=websecure
    - traefik.http.routers.netdata.service=netdata
    - traefik.http.routers.netdata.tls=true
    - traefik.http.services.netdata.loadbalancer.server.port=19999
    - casaos=casaos
    - custom_id=75dbcbfc-89eb-4ca1-9d04-899193caff97
    - origin=local
    - name=netdata
    - desc=Real-time system monitoring
    - protocol=http
    - show_env=casaos
    - io.casaos.v1.app.store.id=0
    - icon=https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Netdata/icon.png
    - web=19999
    - host=100.70.106.23:19999
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
networks:
  monitoring_net:
    external: true
